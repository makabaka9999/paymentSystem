server:
  port: 9000
spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: auth
          uri: lb://auth-service
          predicates: [ Path=/api/auth/** ]
        - id: products
          uri: lb://product-service
          predicates: [ Path=/api/products/** ]
        - id: cart
          uri: lb://cart-service
          predicates: [ Path=/api/cart/** ]
        - id: orders
          uri: lb://order-service
          predicates: [ Path=/api/orders/** ]
        - id: payments
          uri: lb://payment-service
          predicates: [ Path=/api/payments/** ]
        - id: seckill
          uri: lb://seckill-service
          predicates: [ Path=/api/seckill/** ]
        - id: merchant
          uri: lb://merchant-service
          predicates: [ Path=/api/merchant/** ]
        - id: admin
          uri: lb://admin-service
          predicates: [ Path=/api/admin/** ]
        - id: users
          uri: lb://user-service
          predicates: [ Path=/api/users/** ]
